<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
:root {
  --color-surface: #0a1628;
  --color-surface-foreground: #f0f4f8;
  --color-primary: #3b82f6;
  --color-muted-foreground: #94a3b8;
  --color-accent: #f97316;
  --color-border: #1e3a5f;
}
</style>
</head>
<body class="col" style="width:960px;height:540px;background:linear-gradient(180deg, #0a1628 0%, #111d32 100%);padding:24px 30px 10px 30px;">

  <!-- Title -->
  <div class="fit">
    <div class="row items-center" style="gap:10px;">
      <div style="width:6px;height:28px;background:#ef4444;border-radius:999em;"></div>
      <h1 style="font-size:24px;color:#ffffff;margin:0;">📉 美股三大指数（3/12收盘）</h1>
    </div>
    <p style="font-size:11px;color:#94a3b8;margin:4px 0 0 16px;">美伊冲突升温叠加私人信贷市场赎回压力，三大指数集体收跌</p>
  </div>

  <!-- Index Cards -->
  <div class="row fill-height" style="padding:10px 0;gap:16px;">

    <!-- NASDAQ -->
    <div class="col items-center" style="flex:1;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:20px 16px;gap:8px;">
      <p style="font-size:13px;color:#94a3b8;margin:0;letter-spacing:2px;">纳斯达克综合指数</p>
      <p style="font-size:11px;color:#64748b;margin:0;">NASDAQ Composite</p>
      <div style="width:40px;height:2px;background:#ef4444;border-radius:999em;margin:4px 0;"></div>
      <p style="font-size:36px;color:#ffffff;margin:0;font-weight:700;">22,311.98</p>
      <div class="row items-center" style="gap:8px;">
        <p style="font-size:18px;color:#ef4444;margin:0;font-weight:600;">▼ -404.15</p>
        <div style="background:#ef4444;border-radius:6px;padding:2px 10px;">
          <p style="font-size:15px;color:#ffffff;margin:0;font-weight:700;">-1.78%</p>
        </div>
      </div>
    </div>

    <!-- S&P 500 -->
    <div class="col items-center" style="flex:1;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:20px 16px;gap:8px;">
      <p style="font-size:13px;color:#94a3b8;margin:0;letter-spacing:2px;">标普500指数</p>
      <p style="font-size:11px;color:#64748b;margin:0;">S&P 500</p>
      <div style="width:40px;height:2px;background:#ef4444;border-radius:999em;margin:4px 0;"></div>
      <p style="font-size:36px;color:#ffffff;margin:0;font-weight:700;">6,672.62</p>
      <div class="row items-center" style="gap:8px;">
        <p style="font-size:18px;color:#ef4444;margin:0;font-weight:600;">▼ -103.18</p>
        <div style="background:#ef4444;border-radius:6px;padding:2px 10px;">
          <p style="font-size:15px;color:#ffffff;margin:0;font-weight:700;">-1.52%</p>
        </div>
      </div>
    </div>

    <!-- Dow Jones -->
    <div class="col items-center" style="flex:1;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:12px;padding:20px 16px;gap:8px;">
      <p style="font-size:13px;color:#94a3b8;margin:0;letter-spacing:2px;">道琼斯工业指数</p>
      <p style="font-size:11px;color:#64748b;margin:0;">Dow Jones Industrial</p>
      <div style="width:40px;height:2px;background:#ef4444;border-radius:999em;margin:4px 0;"></div>
      <p style="font-size:36px;color:#ffffff;margin:0;font-weight:700;">46,677.85</p>
      <div class="row items-center" style="gap:8px;">
        <p style="font-size:18px;color:#ef4444;margin:0;font-weight:600;">▼ -739.42</p>
        <div style="background:#ef4444;border-radius:6px;padding:2px 10px;">
          <p style="font-size:15px;color:#ffffff;margin:0;font-weight:700;">-1.56%</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom info -->
  <div class="row fit" style="gap:20px;padding-bottom:2px;">
    <div class="row items-center" style="gap:6px;">
      <div style="width:8px;height:8px;background:#ef4444;border-radius:999em;"></div>
      <p style="font-size:11px;color:#94a3b8;margin:0;">原油突破$100/桶</p>
    </div>
    <div class="row items-center" style="gap:6px;">
      <div style="width:8px;height:8px;background:#f97316;border-radius:999em;"></div>
      <p style="font-size:11px;color:#94a3b8;margin:0;">黄金一度失守$5170</p>
    </div>
    <div class="row items-center" style="gap:6px;">
      <div style="width:8px;height:8px;background:#3b82f6;border-radius:999em;"></div>
      <p style="font-size:11px;color:#94a3b8;margin:0;">纳指期货 24,632 (+0.30%)</p>
    </div>
  </div>

  <div class="fit">
    <p style="font-size:9px;color:#475569;margin:0;">数据来源：新华社、东方财富、新浪财经 | 2026.03.13</p>
  </div>
</body>
</html>
