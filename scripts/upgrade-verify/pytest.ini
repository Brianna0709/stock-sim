[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 终端输出：实时打印 INFO 日志
log_cli = true
log_cli_level = INFO

# 默认运行参数
addopts =
    -v
    --tb=long
    --capture=tee-sys
    --html=report.html
    --self-contained-html
    -rN

# 运行方式：python3 -m pytest（不依赖 pytest 在 PATH 中）
